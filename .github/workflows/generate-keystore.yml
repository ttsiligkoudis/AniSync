name: Generate Android signing keystore

# ONE-TIME, phone-friendly setup. Generates a stable signing keystore on the runner and saves it (+ its
# passwords) as the repo secrets the "Build Android APK" workflow uses — so every APK is signed with the
# same key and the app updates in place instead of throwing "package conflicts with an existing package".
#
# The default GITHUB_TOKEN cannot manage Actions secrets, so this needs a PAT with "Secrets: read & write"
# on this repo, stored as the secret KEYSTORE_BOOTSTRAP_PAT. Run it once from the Actions tab (phone browser
# works). After it succeeds you can delete the KEYSTORE_BOOTSTRAP_PAT secret and, if you like, this file.
#
# The keystore itself never leaves GitHub (it's only written into the secret, which can't be read back).
# Re-running generates a NEW key — which would need one more uninstall on the device — so only run again if
# you intend to re-key.
on:
  workflow_dispatch:
    inputs:
      store_password:
        description: "Keystore password (leave blank to auto-generate a strong one)"
        required: false
      key_password:
        description: "Key password (leave blank to reuse the keystore password)"
        required: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and store it as repo secrets
        env:
          GH_TOKEN: ${{ secrets.KEYSTORE_BOOTSTRAP_PAT }}
          IN_STOREPASS: ${{ inputs.store_password }}
          IN_KEYPASS: ${{ inputs.key_password }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing KEYSTORE_BOOTSTRAP_PAT secret — add a PAT with 'Secrets: read & write' on this repo, then re-run."
            exit 1
          fi

          # Auto-generate strong passwords when not supplied; you never need to type or remember them — the
          # build reads them from the secrets this job writes.
          STOREPASS="${IN_STOREPASS:-$(openssl rand -hex 24)}"
          KEYPASS="${IN_KEYPASS:-$STOREPASS}"
          ALIAS="anisync"

          keytool -genkeypair -v -keystore anisync.jks -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$KEYPASS" \
            -dname "CN=AniSync, O=AniSync, C=US"

          B64="$(base64 -w0 anisync.jks)"
          gh secret set ANDROID_KEYSTORE_BASE64   --repo "$GITHUB_REPOSITORY" --body "$B64"
          gh secret set ANDROID_KEYSTORE_PASSWORD --repo "$GITHUB_REPOSITORY" --body "$STOREPASS"
          gh secret set ANDROID_KEY_ALIAS         --repo "$GITHUB_REPOSITORY" --body "$ALIAS"
          gh secret set ANDROID_KEY_PASSWORD      --repo "$GITHUB_REPOSITORY" --body "$KEYPASS"

          echo "Done. The four signing secrets are set; the next APK build will sign with this keystore."
