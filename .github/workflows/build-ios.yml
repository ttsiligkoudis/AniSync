name: Build iOS


# Compile-checks the MAUI app for iOS on a macOS runner (iOS builds need the Apple toolchain, which
# only exists on macOS). This builds the net10.0-ios target for the iOS SIMULATOR, which skips code
# signing — so it needs no Apple Developer account, certificates, or provisioning profiles. It proves
# the project compiles for iOS and that the native libVLC binary (VideoLAN.LibVLC.iOS) links.
#
# This does NOT produce an installable build for real iPhones. A device IPA (TestFlight / App Store /
# ad-hoc) requires an Apple Developer Program membership, a signing certificate, and a provisioning
# profile supplied as secrets — a separate, future task. (It would also warrant replacing the
# placeholder bundle id com.companyname.anisync with a real one.)
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'maui/**'
      - '.github/workflows/build-ios.yml'

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    # .NET 10's iOS workload targets the current-generation Apple SDKs (Xcode 26.x), so this needs the
    # macos-26 image. Its DEFAULT Xcode (26.5) ships an incomplete SDK on the current image — actool /
    # platform SDKs are missing (actions/runner-images #14000, #14172) — so builds that use 26.5 die with
    # "MacOSX.sdk cannot be located" / "unable to find utility actool". We instead use the complete,
    # prior-default Xcode 26.4.1 and pin the .NET iOS workload to the matching band (below).
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Use the complete Xcode 26.4.1 (not the broken default 26.5). Print versions for diagnosability.
      - name: Select Xcode 26.4.1
        run: |
          echo "Available Xcodes:"; ls -d /Applications/Xcode_*.app 2>/dev/null || true
          sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          xcodebuild -version

      # Pin to the 10.0.2xx SDK band so the Xcode-26.4 workload set (10.0.203.1) below is valid for it.
      # 10.0.203 is preinstalled on the macos-26 image.
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.203'

      # The latest iOS workload (26.5.10284) demands the broken Xcode 26.5. Pin to workload set 10.0.203.1,
      # whose iOS SDK (26.4.10259) targets Xcode 26.4 — matching the 26.4.1 selected above. (Published in the
      # dotnet/macios ".NET 10 - Xcode 26.4 support" release notes.) Install the full `maui` workload, not just
      # maui-ios: the csproj multi-targets (android;ios;maccatalyst on macOS), and `dotnet build -f net10.0-ios`
      # still RESTORES every TFM, so all three workloads must be present or restore fails NETSDK1147. Only the
      # iOS TFM is compiled, so the Xcode-26.5 breakage never touches the android/maccatalyst packs.
      - name: Install MAUI workload (Xcode 26.4 band)
        run: dotnet workload install maui --version 10.0.203.1

      # Build for the iOS simulator (arm64 — macOS runners are Apple silicon). Targeting the simulator
      # runtime skips provisioning/signing, so this runs unsigned. If the build can't find a simulator
      # slice in VideoLAN.LibVLC.iOS, the alternative is a device build (-p:RuntimeIdentifier=ios-arm64),
      # which then requires signing and so can't run unsigned here.
      #
      # `-f net10.0-ios` compiles only the iOS TFM. (We don't override TargetFrameworks — that's a GLOBAL
      # property that also leaks into the referenced net9.0 AniSync.Client RCL and breaks its restore.)
      - name: Build iOS (simulator, unsigned)
        run: |
          dotnet build maui/src/AniSync.Maui/AniSync.Maui.csproj \
            -c Release -f net10.0-ios \
            -p:RuntimeIdentifier=iossimulator-arm64

      # Zip the simulator .app the way Appetize.io wants it: a single .zip of the .app bundle, symlinks
      # preserved (-y) so the embedded frameworks (incl. native libVLC) survive. Appetize's free tier runs
      # this arm64 simulator build in-browser on iPhone/iPad skins — no Mac, no Apple account, no signing.
      # (It's a hosted SIMULATOR, not a real device; for the physical iPhone/iPad you need signing.)
      - name: Package simulator .app for Appetize (zip)
        run: |
          APP=$(find maui/src/AniSync.Maui/bin/Release/net10.0-ios/iossimulator-arm64 -maxdepth 2 -name '*.app' -type d | head -n1)
          echo "Zipping $APP"
          ( cd "$(dirname "$APP")" && zip -r -y "$GITHUB_WORKSPACE/anisync-ios-sim.zip" "$(basename "$APP")" )
          ls -lh "$GITHUB_WORKSPACE/anisync-ios-sim.zip"

      # Download this artifact, then upload anisync-ios-sim.zip at https://appetize.io/upload to run it.
      - name: Upload Appetize-ready simulator build
        uses: actions/upload-artifact@v4
        with:
          name: anisync-ios-sim-appetize
          path: anisync-ios-sim.zip
          if-no-files-found: error

      # ---- Unsigned DEVICE .ipa for sideloading (Sideloadly / AltStore on Windows) ----
      # Sideloadly re-signs the app with the user's FREE Apple ID on the PC, so it accepts an UNSIGNED
      # .ipa — no Apple Developer account, no Mac. We build the device (ios-arm64) slice with code signing
      # skipped, then hand-package the .app into the standard Payload/ zip and rename it .ipa.
      # NOTE: free-Apple-ID sideloads last 7 days (Sideloadly's auto-refresh re-signs over USB/Wi-Fi) and
      # are capped at 3 apps per device; Windows needs the DESKTOP iTunes + iCloud (not the Store versions).
      - name: Build iOS device app (unsigned)
        run: |
          dotnet build maui/src/AniSync.Maui/AniSync.Maui.csproj \
            -c Release -f net10.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey= \
            -p:_RequireCodeSigning=false

      - name: Package unsigned .ipa (Payload/)
        run: |
          APP=$(find maui/src/AniSync.Maui/bin/Release/net10.0-ios/ios-arm64 -maxdepth 2 -name '*.app' -type d | head -n1)
          echo "Device app: $APP"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/          # cp -R keeps symlinks (framework bundles) as-is
          zip -r -y anisync-unsigned-ios.ipa Payload
          ls -lh anisync-unsigned-ios.ipa

      # Download this, then in Sideloadly drag in anisync-unsigned-ios.ipa, enter your free Apple ID, Start.
      - name: Upload unsigned .ipa
        uses: actions/upload-artifact@v4
        with:
          name: anisync-ios-ipa-unsigned
          path: anisync-unsigned-ios.ipa
          if-no-files-found: error
