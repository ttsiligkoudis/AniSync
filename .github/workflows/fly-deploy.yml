# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy

on:
  push:
    branches:
      - master
      # Claude on the web always pushes to claude/* branches, never to
      # master. Including the prefix here lets the same workflow handle
      # both: pushes to master deploy directly, pushes to claude/* first
      # open + merge a PR to master and then deploy the merged result.
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-fly:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      # Single deploy lane regardless of which ref triggered the run:
      # a claude/* push and a master push must not race each other into
      # Fly. cancel-in-progress=false makes later runs queue rather than
      # abort a deploy mid-flight.
      group: deploy-fly-master
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      # GITHUB_TOKEN can perform the merge but won't fire a new
      # workflow_run for the master push it produces (documented
      # limitation: events from GITHUB_TOKEN don't trigger workflows).
      # The deploy step below therefore runs inline instead of relying
      # on a re-trigger via the master branch filter above.
      - name: Auto-merge claude branch into master
        if: startsWith(github.ref, 'refs/heads/claude/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" \
                          --base master --state open \
                          --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            # Re-pushing a claude/* branch after its PR was already merged
            # would land here with no commits ahead of master, and gh pr
            # create exits non-zero in that case. Treat it as "nothing to
            # do" rather than failing the job; we still re-deploy master
            # below, which is a cheap no-op if the image hasn't changed.
            if ! gh pr create --repo "$GITHUB_REPOSITORY" \
                              --base master --head "$BRANCH" \
                              --title "Auto-merge: $BRANCH into master" \
                              --body "Automated PR from Claude on the web."; then
              echo "::warning::gh pr create failed (likely no commits ahead of master); skipping merge."
              exit 0
            fi
            PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" \
                            --base master --state open \
                            --json number --jq '.[0].number')
          fi
          gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --merge

      # Re-checkout master so the flyctl step deploys the merged state.
      # For direct master pushes this is a no-op (same ref as the first
      # checkout); for claude/* pushes it picks up the merge commit just
      # produced by gh pr merge above.
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Retry the deploy on failure before giving up — Fly deploys fail transiently often enough
      # (remote builder hiccups, registry/network blips, brief machine-placement errors) that a
      # clean re-run usually succeeds. Up to 3 attempts with a short escalating backoff; the job
      # only fails if every attempt fails. flyctl deploy is safe to re-run — it just builds and
      # releases a fresh version.
      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -uo pipefail
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::flyctl deploy (attempt $i/$attempts)"
            if flyctl deploy --remote-only; then
              echo "::endgroup::"
              echo "Deploy succeeded on attempt $i."
              exit 0
            fi
            echo "::endgroup::"
            if [ "$i" -lt "$attempts" ]; then
              backoff=$((i * 15))
              echo "::warning::Deploy attempt $i failed; retrying in ${backoff}s..."
              sleep "$backoff"
            fi
          done
          echo "::error::Deploy failed after $attempts attempts."
          exit 1
