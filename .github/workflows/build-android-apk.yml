name: Build Android APK

# Builds a signed, installable universal APK (all ABIs, incl. arm64-v8a for the Poco F7) from MASTER and
# uploads it as a workflow artifact you can download and sideload.
#
# Triggered after the "Fly Deploy" workflow finishes successfully: Fly Deploy auto-merges the claude/**
# branch into master (via gh pr merge) and deploys, so chaining off its completion means the APK is built
# from the same merged master that was just deployed. We use workflow_run rather than `push: master`
# because Fly Deploy's merge runs under GITHUB_TOKEN, and GITHUB_TOKEN pushes don't fire push triggers.
# For workflow_run events the checkout defaults to master's latest = the merged state. Also runs on demand.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Fly Deploy"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    # Only build when the deploy succeeded (or on a manual run) — no point shipping an APK from a master
    # that failed to deploy.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # .NET 10 MAUI Android requires JDK 17.
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '17'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Best-effort: ensure the Android 15 (API 35) platform .NET 10 compiles against is present. The
      # ubuntu runner usually ships it; continue-on-error so a path/already-installed case doesn't fail
      # the run (a genuinely missing platform surfaces in the build step below).
      - name: Ensure Android SDK platform 35
        continue-on-error: true
        run: ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      # Installs exactly the workloads the MAUI project needs (maui-android) by reading the csproj.
      - name: Restore MAUI workloads
        run: dotnet workload restore maui/src/AniSync.Maui/AniSync.Maui.csproj

      # Decode the signing keystore from secrets when configured. With a stable keystore, every build shares
      # one signature so the app updates in place (no uninstall). Without the secret it falls back to the
      # ephemeral debug key (still installs, but conflicts across builds — the original problem).
      - name: Decode signing keystore (if configured)
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/anisync.jks"
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — building with the ephemeral debug key. Installs will conflict across builds until a stable keystore is configured."
          fi

      # AndroidPackageFormat=apk forces a single universal APK (not an AAB). When a keystore is configured we
      # release-sign with it (passwords passed via env: refs so they never hit the command line / logs);
      # otherwise the Release build auto-signs with the debug key.
      - name: Build signed APK
        env:
          STOREPASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEYPASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          ARGS="-c Release -f net10.0-android -p:AndroidPackageFormat=apk"
          if [ "${{ steps.keystore.outputs.configured }}" = "true" ]; then
            ARGS="$ARGS -p:AndroidKeyStore=true \
              -p:AndroidSigningKeyStore=$RUNNER_TEMP/anisync.jks \
              -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -p:AndroidSigningStorePass=env:STOREPASS \
              -p:AndroidSigningKeyPass=env:KEYPASS"
          fi
          dotnet build maui/src/AniSync.Maui/AniSync.Maui.csproj $ARGS

      # Friendly, stable filename for the download.
      - name: Stage APK
        run: |
          mkdir -p out
          cp maui/src/AniSync.Maui/bin/Release/net10.0-android/*-Signed.apk out/anisync.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anisync-android-apk
          path: out/anisync.apk
          if-no-files-found: error

      # Publish to a rolling prerelease so the APK is a DIRECT download (release assets aren't zipped, unlike
      # workflow artifacts) at a stable URL, and installs straight from the phone browser:
      #   https://github.com/ttsiligkoudis/AniSync/releases/download/android-latest/anisync.apk
      # The tag is moved to the current commit and the asset replaced on every build.
      - name: Publish APK to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: AniSync Android (latest)
          prerelease: true
          files: out/anisync.apk
          body: |
            Latest AniSync Android build, for sideloading. If Android reports a signature conflict on
            install, uninstall the previously installed build first. Built from commit ${{ github.sha }}.
