name = "anisync-mkv-extractor-rs"
main = "build/worker/shim.mjs"
compatibility_date = "2024-12-30"

# Same workers_dev = true default as the JS worker — gives us a
# *.workers.dev URL out of the box so we can swap MKV_EXTRACTOR_URL
# in AniSync's config without setting up a custom domain.
workers_dev = true

# Rust → WASM build via worker-build. INSTALL worker-build YOURSELF
# once globally before the first deploy:
#
#   cargo install worker-build --version 0.1.7 --locked
#
# (Pinned to 0.1.7 because the worker crate this project targets
# is 0.4 — worker-build 0.2+ requires worker@0.8+ and would force
# a non-trivial API rewrite. When the worker crate itself is bumped,
# drop the version pin and reinstall worker-build to whatever's
# current.)
#
# We install OUTSIDE wrangler.toml because PowerShell / cmd treat
# `^` and other version-spec characters as shell metacharacters
# and mangle them before cargo sees them. Running cargo install
# manually side-steps all of that — and it's a one-time cost
# anyway since cargo install is idempotent.
[build]
command = "worker-build --release"

# Optional shared secret. Set with:
#   npx wrangler secret put PROXY_SECRET
# Mirrors the JS worker so the client's MKV_EXTRACTOR_SECRET
# config works against either implementation.
# [vars] left empty intentionally.
