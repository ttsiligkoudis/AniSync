# Disable post-MVP WASM features so the wasm-opt bundled with
# worker-build 0.1.x (a 2022-era binaryen build) can validate the
# compiled output.
#
# Rust 1.82 enabled bulk-memory + sign-ext + reference-types by
# default for the wasm32-unknown-unknown target. Older wasm-opt
# fails validation on those instructions:
#
#   [wasm-validator error] unexpected false: Bulk memory operations
#   require bulk memory [--enable-bulk-memory], on (memory.copy ...)
#
# Earlier we tried `target-cpu=mvp` — that handles some features
# but not the ones promoted to target defaults in 1.82. The
# definitive switch is `target-feature=-<name>` per feature.
# Listing every post-MVP feature even if a given Rust version
# doesn't enable it by default — cheap insurance against a future
# Rust upgrade re-introducing the same problem.
#
# Drop this whole file once we bump to worker 0.8+ / worker-build
# 0.2+, which ship a current wasm-opt that handles modern features.

[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "target-feature=-bulk-memory,-sign-ext,-reference-types,-multivalue,-nontrapping-fptoint",
]
