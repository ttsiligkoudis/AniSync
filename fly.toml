# fly.toml app configuration file generated for anisync-dry-hill-7609 on 2026-03-27T23:10:04+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'anisync'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # `suspend` keeps the .NET process resident and wakes in ~1s vs the ~5-10s cold
  # start of `stop`. The mapping cache (~10-50MB JSON) doesn't get re-downloaded.
  # Falls back to a full stop if Fly's host runs out of RAM for suspended machines.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # GET /health is the ASP.NET Core liveness endpoint registered in Program.cs.
  # Fly recycles the machine if checks fail past the grace period — catches a
  # wedged process (deadlock, GC death spiral) that's still listening on the
  # socket. grace_period covers the cold-boot / wake-from-suspend window.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[env]
  ANISYNC_DATA_DIR = '/data'

# Persistent volume for the config store SQLite file. Provisioned once with
# `fly volume create anisync_data --size 1 --region fra`. Volumes are pinned to a
# single machine, which is fine while min_machines_running stays at 0/1.
[[mounts]]
  source = 'anisync_data'
  destination = '/data'

[[vm]]
  # 1 GB gives the runtime + mapping cache + any in-process API caches headroom
  # so GC doesn't thrash on bigger AniList responses. Still well inside Fly's
  # €5/mo free allowance with auto-suspend on top.
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
