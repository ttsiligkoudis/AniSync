# fly.toml app configuration file generated for anisync-dry-hill-7609 on 2026-03-27T23:10:04+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aniSync'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  ANISYNC_DATA_DIR = '/data'

# Persistent volume for the config store SQLite file. Provisioned once with
# `fly volume create anisync_data --size 1 --region fra`. Volumes are pinned to a
# single machine, which is fine while min_machines_running stays at 0/1.
[[mounts]]
  source = 'anisync_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
