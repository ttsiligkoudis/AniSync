name = "anisync-mkv-extractor"
main = "src/index.js"
# Bumped to a recent date so we pick up runtime fixes for subrequest
# connection handling. Specifically rolls in a number of stream/
# Response stability improvements that landed in workerd through
# 2025. compatibility_date is a contract about which runtime
# behaviours we opt into — newer is fine for our pure-JS code.
compatibility_date = "2025-04-01"

# Optional shared secret — same model as cf-cors-proxy. Set with:
#   npx wrangler secret put PROXY_SECRET
# Then set MKV_EXTRACTOR_SECRET on the AniSync side to the same value.

[observability.logs]
enabled = true
invocation_logs = true

