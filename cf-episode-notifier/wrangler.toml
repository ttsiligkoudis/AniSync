name = "anisync-episode-notifier"
main = "src/index.js"
compatibility_date = "2025-04-01"

# Cron schedule: every 5 minutes. Cloudflare's cron triggers are
# at-least-once and not guaranteed exact-to-the-minute; the .NET
# dispatcher's UNIQUE INDEX on (uid, anime_id, season, episode_number)
# absorbs duplicate ticks via INSERT OR IGNORE, and the 25h notification
# window (start = now-1h, end = now+24h) absorbs the occasional
# missed tick.
[triggers]
crons = ["*/5 * * * *"]

# Secrets — set with:
#   npx wrangler secret put ANISYNC_URL    # e.g. https://anisync.fly.dev
#   npx wrangler secret put CRON_SECRET    # must match ANISYNC_CRON_SECRET on the .NET side
