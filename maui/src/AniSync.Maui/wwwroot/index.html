<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AniSync</title>
    <base href="/" />
    <meta name="theme-color" content="#0b0d12" />
    <!-- Shared design system (verbatim site.css) from the AniSync.Client RCL. -->
    <link rel="stylesheet" href="_content/AniSync.Client/css/site.css" />
    <link rel="stylesheet" href="AniSync.Maui.styles.css" />
    <link rel="icon" href="data:,">

    <!-- Branded boot screen shown until Blazor mounts into #app, replacing the bare "Loading…" text.
         Inline so it paints instantly (before site.css resolves) and blends with the dark native splash.
         Scope the dark fill to .app-boot ONLY — setting it on body would override site.css's themed
         `body { background: var(--bg) }` (this <style> wins by source order) and force a dark page in light
         theme. .app-boot is fixed/full-screen so it covers any flash on its own. -->
    <style>
        #app { min-height: 100vh; }
        .app-boot {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 1.5rem; background: #0A0A0A;
        }
        .app-boot img { width: 84px; height: 84px; }
        .app-boot-spinner {
            width: 26px; height: 26px; border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.14);
            border-top-color: #8b5cf6;
            animation: app-boot-spin 0.8s linear infinite;
        }
        @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="app-boot">
            <img src="_content/AniSync.Client/img/logo-192.png" alt="AniSync" />
            <div class="app-boot-spinner" role="status" aria-label="Loading"></div>
        </div>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <!-- Shared shell behaviour (theme toggle, back button, mobile "More" sheet). -->
    <script src="_content/AniSync.Client/js/chrome.js"></script>

</body>

</html>
