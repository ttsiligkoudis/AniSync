<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AniSync</title>
    <base href="/" />
    <meta name="theme-color" content="#0b0d12" />
    <!-- Shared design system (verbatim site.css) from the AniSync.Client RCL. -->
    <link rel="stylesheet" href="_content/AniSync.Client/css/site.css" />
    <link rel="stylesheet" href="AniSync.Maui.styles.css" />
    <link rel="icon" href="data:,">

    <!-- Stamp the saved theme on <html> before first paint so the boot screen (and the app) match the
         user's light/dark choice instead of flashing dark. Same localStorage key chrome.js uses; chrome.js
         re-applies later (idempotent). Falls back to prefers-color-scheme when nothing is saved. -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('anisync-theme');
                if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
            } catch (e) { /* storage blocked — CSS prefers-color-scheme decides */ }
        })();
    </script>

    <!-- Boot screen shown until Blazor mounts into #app. Theme-coloured (var(--bg)) so it matches the
         user's light/dark choice; the logo is transparent so it sits cleanly on either. -->
    <style>
        #app { min-height: 100vh; }
        .app-boot {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
        }
        .app-boot img { width: 150px; height: 150px; }
    </style>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="app-boot">
            <img src="_content/AniSync.Client/img/logo-192.png" alt="AniSync" />
        </div>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <!-- Shared shell behaviour (theme toggle, back button, mobile "More" sheet). -->
    <script src="_content/AniSync.Client/js/chrome.js"></script>
    <!-- Native head only: open external (target=_blank) links in the system browser. Android's WebView
         drops _blank, so without this the Sign-up / API-key / manifest links do nothing. -->
    <script src="js/native-links.js"></script>
    <!-- D-pad / remote spatial navigation for Android TV / Google TV. Self-detects TV mode (UA + a no-touch
         capability heuristic) and no-ops on phones, so it's safe to load on the native head everywhere. -->
    <script src="_content/AniSync.Client/js/tv-navigation.js"></script>

</body>

</html>
